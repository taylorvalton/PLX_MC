<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hyperframes/core/dist/hyperframe.runtime.iife.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@hyperframes/shader-transitions/dist/index.global.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <style>
      :root {
        --paper: #f3ede1;
        --ink: #0c1a14;
        --accent: #0a3a2a;
        --accent-2: #14523a;
        --hot: #d96a4a;
        --muted: #5a6b5e;
        --grid: rgba(12, 26, 20, 0.18);
        --grid-soft: rgba(12, 26, 20, 0.10);
        --font-display: "Instrument Serif", "Times New Roman", serif;
        --font-body: "Inter Tight", system-ui, sans-serif;
        --font-data: "JetBrains Mono", monospace;
      }

      * { margin:0; padding:0; box-sizing:border-box; }
      html, body { width:1920px; height:1080px; overflow:hidden; background:var(--paper); color:var(--ink); font-family: var(--font-body); }

      .scene { position:absolute; top:0; left:0; width:1920px; height:1080px; overflow:hidden; background:var(--paper); }
      .scene-content { width:100%; height:100%; position:relative; z-index:1; }

      /* --- Page-level chrome --- */
      .page-frame {
        position:absolute; inset: 56px 80px;
        border:1px solid var(--grid);
        background:
          linear-gradient(var(--paper), var(--paper)) padding-box,
          linear-gradient(var(--paper), var(--paper));
      }
      .crosshair {
        position:absolute; pointer-events:none;
        background: var(--ink);
      }
      .ch-h { left:0; right:0; height:1px; opacity:0.10; }
      .ch-v { top:0; bottom:0; width:1px; opacity:0.10; }

      .label {
        font-family: var(--font-data);
        font-size: 16px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: var(--muted);
        position:absolute;
      }
      .label.hot { color: var(--hot); }
      .label .dot { display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--hot); margin-right:10px; vertical-align:1px; }

      /* --- Top labels --- */
      .lbl-fig    { top: 80px; left: 110px; }
      .lbl-sample { top: 110px; left: 110px; }
      .lbl-id     { top: 138px; left: 138px; font-family: var(--font-display); font-size: 22px; letter-spacing: 0.18em; color: var(--ink); text-transform: none;}
      .lbl-scale  { top: 80px; right: 110px; }

      /* --- Bottom labels --- */
      .lbl-foot-l { bottom: 80px; left: 110px; }
      .lbl-foot-r { bottom: 80px; right: 110px; }

      /* --- Center stage / SVG --- */
      .stage { position:absolute; inset: 0; display:flex; align-items:center; justify-content:center; }
      .stage svg { width: 1100px; height: 1100px; display:block; }

      /* --- Side callout text --- */
      .callouts { position:absolute; top:0; right:140px; height:100%; display:flex; flex-direction:column; justify-content:center; gap: 130px; align-items:flex-start; pointer-events:none; }
      .co { font-family: var(--font-data); font-size: 16px; letter-spacing: 0.22em; text-transform: uppercase;}
      .co .k { color: var(--ink); display:block; margin-bottom: 8px;}
      .co .v { color: var(--muted); }
      .co .v .em { color: var(--accent); font-family: var(--font-display); font-style: italic; font-size: 22px; letter-spacing: 0.02em; text-transform: none; vertical-align: -1px;}

      /* --- Diameter caliper --- */
      .caliper { position:absolute; left: 230px; top: 50%; transform: translateY(-50%); font-family: var(--font-data); font-size: 16px; letter-spacing: 0.22em; color: var(--ink); }

      /* --- Grain --- */
      .grain {
        position:absolute; inset:0; pointer-events:none; z-index:50; opacity:0.10;
        background-image:
          radial-gradient(rgba(12,26,20,0.18) 1px, transparent 1.2px),
          radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.2px);
        background-size: 3px 3px, 5px 5px;
        background-position: 0 0, 1px 2px;
        mix-blend-mode: multiply;
      }

      /* --- Init readout (top-right transient) --- */
      .readout { position:absolute; top: 80px; right: 110px; text-align:right; font-family: var(--font-data); font-size: 14px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; line-height: 1.7; }
      .readout .row { display:block; opacity: 0.85;}
      .readout .row .ok { color: var(--accent); }

      /* --- SCAN BAR --- */
      .scan {
        position:absolute; left: 50%; top: 0; bottom:0; width: 1px; transform: translateX(-50%);
        background: linear-gradient(to bottom, transparent, var(--hot), transparent);
        opacity: 0.6;
        z-index: 5;
        will-change: transform;
      }
    </style>
  </head>
  <body>
    <div id="main" data-composition-id="main" data-width="1920" data-height="1080" data-start="0" data-duration="6">

      <div class="scene clip" id="s1" data-start="0" data-duration="6" data-track-index="0">
        <div class="grain"></div>
        <div class="scene-content">

          <!-- Page chrome -->
          <div class="page-frame" id="frame"></div>
          <div class="crosshair ch-h" id="chh" style="top:50%;"></div>
          <div class="crosshair ch-v" id="chv" style="left:50%;"></div>

          <!-- Top labels -->
          <div class="label lbl-fig" id="lbl-fig">FIG. 02 · CROSS-SECTION</div>
          <div class="label lbl-sample hot" id="lbl-sample"><span class="dot"></span>SAMPLE</div>
          <div class="lbl-id" id="lbl-id">PLX-N-014</div>
          <div class="readout" id="readout">
            <span class="row" id="r1">› INIT SCOPE ............ <span class="ok">OK</span></span>
            <span class="row" id="r2">› LOAD SAMPLE .......... <span class="ok">OK</span></span>
            <span class="row" id="r3">› RESOLVE PHASE ........ <span class="ok">OK</span></span>
            <span class="row" id="r4" style="color:var(--ink);">SCALE 1 : 1</span>
          </div>

          <!-- Diameter caliper text -->
          <div class="caliper" id="caliper">⌀ 300nm</div>

          <!-- Stage -->
          <div class="stage">
            <svg id="diagram" viewBox="-550 -550 1100 1100">
              <!-- caliper bracket lines -->
              <g id="caliper-bracket" stroke="var(--ink)" stroke-width="1.2" fill="none" opacity="0">
                <line x1="-440" y1="-115" x2="-440" y2="115"/>
                <line x1="-450" y1="-115" x2="-430" y2="-115"/>
                <line x1="-450" y1="115"  x2="-430" y2="115"/>
              </g>

              <!-- outer dotted ring (phase boundary) -->
              <circle id="ring-outer-dotted" cx="0" cy="0" r="430" fill="none" stroke="var(--accent)" stroke-width="1" stroke-dasharray="3 8" opacity="0"/>

              <!-- main outer ring -->
              <circle id="ring-outer" cx="0" cy="0" r="380" fill="none" stroke="var(--ink)" stroke-width="2.5"
                pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>

              <!-- inner ring -->
              <circle id="ring-inner" cx="0" cy="0" r="240" fill="none" stroke="var(--accent)" stroke-width="1.5"
                pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>

              <!-- center disc (active core) -->
              <circle id="core" cx="0" cy="0" r="115" fill="var(--accent)" opacity="0"/>
              <circle id="core-pulse" cx="0" cy="0" r="115" fill="none" stroke="var(--accent)" stroke-width="1.5" opacity="0"/>

              <!-- crosshair through center -->
              <line id="ch-x" x1="-380" y1="0" x2="380" y2="0" stroke="var(--ink)" stroke-width="1" opacity="0"/>
              <circle id="ch-dot" cx="0" cy="0" r="3" fill="var(--ink)" opacity="0"/>

              <!-- particles: gray (lipid) and rust (active) on a ~310px ring -->
              <g id="particles">
                <!-- gray particles -->
                <circle class="p p-gray" cx="0"    cy="-310" r="9"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="155"  cy="-268" r="8"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="268"  cy="-155" r="9"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="310"  cy="0"    r="8"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="268"  cy="155"  r="9"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="155"  cy="268"  r="8"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="-155" cy="268"  r="8"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="-268" cy="155"  r="9"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="-310" cy="0"    r="8"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="-268" cy="-155" r="9"  fill="var(--muted)" opacity="0"/>
                <circle class="p p-gray" cx="-155" cy="-268" r="8"  fill="var(--muted)" opacity="0"/>
                <!-- rust (active) -->
                <circle class="p p-hot" cx="220"  cy="-220" r="13" fill="var(--hot)" opacity="0"/>
                <circle class="p p-hot" cx="-205" cy="-180" r="13" fill="var(--hot)" opacity="0"/>
                <circle class="p p-hot" cx="240"  cy="180"  r="13" fill="var(--hot)" opacity="0"/>
                <circle class="p p-hot" cx="-90"  cy="280"  r="13" fill="var(--hot)" opacity="0"/>
              </g>

              <!-- callout leader lines (drawn from rings out toward right side) -->
              <g id="leaders" stroke="var(--ink)" stroke-width="1" fill="none">
                <path id="lead-A" d="M 270 -195 L 460 -245" pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
                <path id="lead-B" d="M 380 0    L 540 0"    pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
                <path id="lead-C" d="M 280 240  L 460 290"  pathLength="1" stroke-dasharray="1" stroke-dashoffset="1"/>
              </g>
            </svg>
          </div>

          <!-- Right-hand callouts -->
          <div class="callouts">
            <div class="co" id="co-a">
              <span class="k">A · ACTIVE CORE</span>
              <span class="v"><span class="em">5.0%</span> Niacinamide</span>
            </div>
            <div class="co" id="co-b">
              <span class="k">B · LIPID SHELL</span>
              <span class="v">Squalane / GMS</span>
            </div>
            <div class="co" id="co-c">
              <span class="k">C · PHASE BOUNDARY</span>
              <span class="v">pH <span class="em">5.4 — 6.8</span></span>
            </div>
          </div>

          <!-- Foot -->
          <div class="label lbl-foot-l">PLX · PETRA LAB-X · R&amp;D</div>
          <div class="label lbl-foot-r" id="foot-r">SAMPLE LOT 26-Q2-114</div>

          <!-- Scan bar -->
          <div class="scan" id="scan"></div>
        </div>
      </div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });

      /* === SCENE 1 (0-6s) — Diagnostic Boot ===
         Beat 1 (0.0 – 1.2s)  System initializes: page frame, crosshairs, FIG/SAMPLE labels
         Beat 2 (0.4 – 1.5s)  Scan bar sweeps left→right; readout flashes
         Beat 3 (1.0 – 2.5s)  Rings draw stroke-by-stroke from outside in
         Beat 4 (2.0 – 3.0s)  Particles populate (gray first, rust on top), caliper resolves
         Beat 5 (2.8 – 3.6s)  Active core appears; pulse begins
         Beat 6 (3.2 – 4.6s)  Leader lines draw out; callouts fade in one by one
         Beat 7 (4.2 – 6.0s)  Hold; subtle continuous breathing pulse on core; gentle particle drift
      */

      // initial state — set what we'll animate
      gsap.set(["#frame", "#chh", "#chv"], { autoAlpha: 0 });
      gsap.set(["#lbl-fig", "#lbl-sample", "#lbl-id", "#readout", "#caliper"], { autoAlpha: 0 });
      gsap.set([".lbl-foot-l", ".lbl-foot-r"], { autoAlpha: 0 });
      gsap.set("#scan", { x: -960, autoAlpha: 0 });
      gsap.set(["#co-a", "#co-b", "#co-c"], { autoAlpha: 0, x: 20 });
      gsap.set(".readout .row", { autoAlpha: 0 });

      // BEAT 1 — chrome boots
      tl.to("#frame", { autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 0.05);
      tl.to(["#chh", "#chv"], { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 0.2);
      tl.to("#lbl-fig", { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 0.4);
      tl.to("#lbl-sample", { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 0.55);
      tl.to("#lbl-id", { autoAlpha: 1, duration: 0.5, ease: "power3.out" }, 0.7);

      // BEAT 2 — scan + readout
      tl.to("#scan", { autoAlpha: 0.7, duration: 0.2 }, 0.4);
      tl.to("#scan", { x: 960, duration: 1.4, ease: "power2.inOut" }, 0.4);
      tl.to("#scan", { autoAlpha: 0, duration: 0.2 }, 1.7);

      tl.to("#readout", { autoAlpha: 1, duration: 0.2 }, 0.55);
      tl.to("#r1", { autoAlpha: 1, duration: 0.15, ease: "steps(1)" }, 0.7);
      tl.to("#r2", { autoAlpha: 1, duration: 0.15, ease: "steps(1)" }, 1.0);
      tl.to("#r3", { autoAlpha: 1, duration: 0.15, ease: "steps(1)" }, 1.3);
      tl.to("#r4", { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 1.6);
      // fade readout out (it's a boot diagnostic, not part of the final composition)
      tl.to("#readout", { autoAlpha: 0, duration: 0.5, ease: "power2.out" }, 4.4);

      // BEAT 3 — rings draw
      tl.to("#ring-outer", { strokeDashoffset: 0, duration: 1.2, ease: "power2.inOut" }, 1.0);
      tl.to("#ring-inner", { strokeDashoffset: 0, duration: 1.0, ease: "power2.inOut" }, 1.4);
      tl.to("#ring-outer-dotted", { opacity: 0.7, duration: 0.6, ease: "power2.out" }, 2.0);

      // crosshair through center
      tl.to("#ch-x", { opacity: 0.18, duration: 0.4, ease: "power2.out" }, 2.2);
      tl.to("#ch-dot", { opacity: 1, duration: 0.3, ease: "back.out(1.6)" }, 2.4);

      // BEAT 4 — particles populate
      tl.to(".p-gray", {
        opacity: 1,
        duration: 0.35,
        ease: "back.out(1.6)",
        stagger: { each: 0.04, from: "start" }
      }, 2.0);
      tl.to(".p-hot", {
        opacity: 1,
        duration: 0.45,
        ease: "back.out(2)",
        stagger: { each: 0.08, from: "start" }
      }, 2.5);

      // caliper resolves
      tl.to("#caliper-bracket", { opacity: 1, duration: 0.4, ease: "power2.out" }, 2.4);
      tl.to("#caliper", { autoAlpha: 1, duration: 0.4, ease: "power2.out" }, 2.6);

      // BEAT 5 — active core
      tl.fromTo("#core",
        { opacity: 0, transformOrigin: "50% 50%", scale: 0.6 },
        { opacity: 1, scale: 1, duration: 0.6, ease: "expo.out" },
        2.9);
      // pulse ring (one shot bloom)
      tl.fromTo("#core-pulse",
        { opacity: 0.8, scale: 1, transformOrigin: "50% 50%" },
        { opacity: 0, scale: 1.6, duration: 1.2, ease: "power2.out" },
        3.1);

      // BEAT 6 — leader lines + callouts
      tl.to("#lead-A", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 3.3);
      tl.to("#co-a",  { autoAlpha: 1, x: 0, duration: 0.5, ease: "power2.out" }, 3.5);

      tl.to("#lead-B", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 3.7);
      tl.to("#co-b",  { autoAlpha: 1, x: 0, duration: 0.5, ease: "power2.out" }, 3.9);

      tl.to("#lead-C", { strokeDashoffset: 0, duration: 0.5, ease: "power2.out" }, 4.1);
      tl.to("#co-c",  { autoAlpha: 1, x: 0, duration: 0.5, ease: "power2.out" }, 4.3);

      // foot labels last
      tl.to(".lbl-foot-l", { autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 4.5);
      tl.to(".lbl-foot-r", { autoAlpha: 1, duration: 0.5, ease: "power2.out" }, 4.6);

      // BEAT 7 — continuous breathing on core (subtle)
      tl.to("#core", {
        scale: 1.04,
        duration: 0.7,
        ease: "sine.inOut",
        transformOrigin: "50% 50%",
        yoyo: true,
        repeat: 1
      }, 4.8);

      // gentle drift on hot particles (mid-scene activity)
      tl.to(".p-hot", {
        y: "+=4",
        duration: 0.8,
        ease: "sine.inOut",
        yoyo: true,
        repeat: 1,
        stagger: { each: 0.05, from: "center" }
      }, 4.6);

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>

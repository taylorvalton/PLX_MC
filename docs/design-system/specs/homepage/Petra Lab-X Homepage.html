<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Petra Lab-X · Homepage Directions</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=PP+Neue+Montreal&family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />
    <style>
      html, body { margin:0; padding:0; background:#1a1a1a; color:#fff; font-family:"Space Grotesk", system-ui, sans-serif;}
      iframe { background: transparent; }
      /* artboard scroll body */
      .artboard-scroll { width: 1440px; height: 1700px; }
    </style>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel" src="tweaks-panel.jsx"></script>
    <script type="text/babel" src="homepage.jsx"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" data-presets="env,react">
      const { useState, useEffect } = React;

      function App() {
        const [tweaks, setTweaks] = useTweaksHomepage();
        const setTweak = (k, v) => setTweaks(typeof k === 'object' ? k : {[k]: v});

        return (
          <>
            <DesignCanvas title="Petra Lab-X · Homepage Directions" subtitle="Three takes on the new homepage. Click any artboard to focus it. Scroll inside artboards to view the full page.">
              <DCSection id="directions" title="Three Directions">
                <DCArtboard id="A" label="A · Spec Sheet — industrial / engineered" width={1440} height={1700}>
                  <div style={{width:1440, height:'auto', overflow:'hidden'}}>
                    <HomepageSpecSheet accent={tweaks.accentA} density={tweaks.density} />
                  </div>
                </DCArtboard>
                <DCArtboard id="B" label="B · Apothecary Lab — clinical, ingredient-as-hero" width={1440} height={1700}>
                  <div style={{width:1440, height:'auto', overflow:'hidden'}}>
                    <HomepageApothecary accent={tweaks.accentB} density={tweaks.density} />
                  </div>
                </DCArtboard>
                <DCArtboard id="C" label="C · Kinetic — bold, saturated, motion-forward" width={1440} height={1700}>
                  <div style={{width:1440, height:'auto', overflow:'hidden'}}>
                    <HomepageKinetic accent={tweaks.accentC} density={tweaks.density} />
                  </div>
                </DCArtboard>
              </DCSection>
            </DesignCanvas>

            <TweaksPanel title="Tweaks">
              <TweakSection title="Accent — A · Spec Sheet">
                <TweakColor label="Accent" value={tweaks.accentA} onChange={v => setTweak('accentA', v)} />
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:8}}>
                  {['#ff5a1f','#ff2e63','#00e0ff','#c8ff2e','#ffce1f','#a86bff'].map(c => (
                    <button key={c} onClick={()=>setTweak('accentA', c)} style={{width:32,height:32,borderRadius:8,border:'1px solid #444',background:c,cursor:'pointer'}} />
                  ))}
                </div>
              </TweakSection>
              <TweakSection title="Accent — B · Apothecary">
                <TweakColor label="Accent" value={tweaks.accentB} onChange={v => setTweak('accentB', v)} />
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:8}}>
                  {['#0a3a2a','#a83a26','#5b3a8a','#3a5a8a','#0c1a14','#7a5a26'].map(c => (
                    <button key={c} onClick={()=>setTweak('accentB', c)} style={{width:32,height:32,borderRadius:8,border:'1px solid #444',background:c,cursor:'pointer'}} />
                  ))}
                </div>
              </TweakSection>
              <TweakSection title="Accent — C · Kinetic">
                <TweakColor label="Accent" value={tweaks.accentC} onChange={v => setTweak('accentC', v)} />
                <div style={{display:'flex', gap:8, flexWrap:'wrap', marginTop:8}}>
                  {['#c8ff2e','#ff2e63','#00e0ff','#ff5a1f','#ffce1f','#a86bff'].map(c => (
                    <button key={c} onClick={()=>setTweak('accentC', c)} style={{width:32,height:32,borderRadius:8,border:'1px solid #444',background:c,cursor:'pointer'}} />
                  ))}
                </div>
              </TweakSection>
              <TweakSection title="Density (all directions)">
                <TweakRadio
                  value={tweaks.density}
                  onChange={v => setTweak('density', v)}
                  options={[
                    {value:'compact', label:'Compact'},
                    {value:'comfortable', label:'Comfortable'},
                  ]}
                />
              </TweakSection>
            </TweaksPanel>
          </>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
  </body>
</html>

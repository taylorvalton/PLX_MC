# Local enforcement of the preflight gate.
# Install once per clone:  pre-commit install --hook-type pre-commit --hook-type pre-push
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.6
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-added-large-files
      - id: detect-private-key
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: preflight-commit
        name: Preflight gate (commit)
        entry: bash scripts/preflight.sh --mode pre-commit
        language: system
        always_run: true
        pass_filenames: false
      - id: preflight-push
        name: Preflight gate (push)
        entry: bash scripts/preflight.sh --mode pre-push
        language: system
        always_run: true
        pass_filenames: false
        stages: [push]

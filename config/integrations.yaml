# External Integrations Register
#
# Per the governance contract (config/governance-contract.yaml →
# external_integrations): every external provider / autonomous integration must
# declare — before merge — owner, scope, auth source, default state, kill switch
# or feature flag, health check, fallback path, and data/audit boundary.
#
# This file is the declaration surface for those integrations (the contract
# carries the RULES; this carries the per-integration DECLARATIONS). It is read
# by humans and agents reviewing integration changes. It is NOT a generated
# governance block — edit it directly.
#
# Canonical location: config/integrations.yaml
# Owner: Vince (vince@petrasoap.com)

version: "0.1.0"

integrations:
  - id: meeting-intake
    name: Meeting → Mission Control bridge
    resolves: EN-004 (WS-4)
    owner: Vince (vince@petrasoap.com)
    criticality: Medium
    # runtime = ships in the deployed app; local-only = operator tool. This is a
    # runtime feature but ships OFF and is not represented as deployed capability
    # until explicitly enabled.
    scope: runtime (gated; off by default)
    autonomous: true # derives proposed tasks from meeting artifacts
    default_state: off
    feature_flag: PLX_MC_MEETING_INTAKE_ENABLED (env; NEXT_PUBLIC_ variant for the UI gate)
    kill_switch: tripMeetingIntakeKillSwitch() — forces off regardless of the flag (src/lib/meeting-intake/flag.ts)
    auth_source:
      # All credentials come from the shared secrets accessor (src/lib/secrets.ts) —
      # no hardcoded keys, no scattered env lookups.
      - Microsoft Graph (app-only client credentials) — MICROSOFT_GRAPH_* via graphCredentials()
      - Azure OpenAI (in-tenant transcript extractor) — AZURE_OPENAI_* via azureOpenAiConfig()
    health_check: meetingIntakeHealth() — reports flag/kill-switch state + whether Graph/Azure env is configured (src/lib/meeting-intake/health.ts)
    fallback_path: >-
      Two capture tiers: native Graph aiInsights (Copilot-licensed) with a
      fallback to raw transcript (.vtt) + in-tenant extraction. When neither the
      flag is on nor a meeting is opted in, capture is a no-op; when Azure is
      unconfigured the Tier A live path stays dormant and fails visibly rather
      than fabricating action items.
    data_audit_boundary: >-
      Transcripts are reasoned over IN-TENANT only (Azure OpenAI) — never an
      external LLM. Captured items land as PROPOSED tasks in a human-confirmed
      triage queue; nothing auto-enters the governed plan. On promotion the
      governed task carries the meeting source (snippet + timestamp) as a
      traceability artifact and mirrors through the standard ToDos path.
    scope_v1: >-
      Opt-in only — a simple meeting register (by meeting id / calendar tag)
      designates which meetings feed the bridge. Loop is deferred; Teams meeting
      artifacts only.
    deferred:
      - Graph change-notification subscription wiring (needs a public webhook
        endpoint) — capture entrypoints accept payloads directly until then.

  - id: vendor-spend
    name: AI Spend — vendor cost adapters (AWS / Anthropic / Cursor)
    owner: Vince (vince@petrasoap.com)
    criticality: Medium
    # Read-only cost pulls from three vendor billing APIs; manual entry covers
    # every other registry vendor. Runtime feature, but each adapter is
    # key-gated and ships dormant until its credential exists.
    scope: runtime (read-only pulls; per-adapter key gating)
    autonomous: false # reads billing data only; never sends/posts/changes vendor config
    default_state: off (per adapter — dormant until its key is configured)
    feature_flag: >-
      Per-adapter presence checks in src/lib/secrets.ts —
      awsCostExplorerConfigured(), anthropicAdminConfigured(),
      cursorAdminConfigured(). Scheduled refresh additionally rides CRON_SECRET
      (unset → /api/cron/vendor-spend-refresh returns 503).
    kill_switch: >-
      Remove the vendor's key from the environment/secrets manager — the
      adapter degrades visibly on the next pull. Unset CRON_SECRET (or drop the
      vercel.json cron entry) to stop scheduled refreshes entirely.
    auth_source:
      - AWS Cost Explorer — standard AWS credential chain via awsCostExplorerCredentials() (AWS_ACCESS_KEY_ID/AWS_SECRET_ACCESS_KEY, or ambient role with AWS_COST_EXPLORER_USE_AMBIENT=1)
      - Anthropic Admin API — ANTHROPIC_ADMIN_API_KEY via anthropicAdminApiKey() (admin key, sk-ant-admin01-…)
      - Cursor Enterprise Admin API — CURSOR_ADMIN_API_KEY via cursorAdminApiKey()
    health_check: >-
      Every pull writes a vendor_cost_refresh_log row (ok/degraded/error) and
      the UI renders per-vendor source status (API · LIVE / API · DEGRADED /
      MANUAL) with the degraded reason and missing secret named — visible
      state, never fabricated spend.
    fallback_path: >-
      Manual cost snapshots (POST /api/vendor-spend/snapshots) work for every
      vendor regardless of adapter health; a degraded adapter never blocks
      budgets or manual tracking.
    data_audit_boundary: >-
      Reads aggregate cost figures only (no prompts, no per-user content;
      Cursor per-user spend is summed to a team total before persistence).
      Secrets never leave the accessor; refresh outcomes are logged per vendor
      with timestamps. In-app alerts only in v1 — email/Teams delivery is
      deferred to artifacts/platform/2026-06-30-vendor-spend-alerts-followup/.

  - id: repo-registry-mirror
    name: Repo Registry → SharePoint mirror
    resolves: EN-002 (Item 2)
    owner: Vince (vince@petrasoap.com)
    criticality: Low
    # Push-only mirror of the repo allow-list to a "Repo Registry" SharePoint
    # list. Runtime, but rides the existing sync sweep and is doubly gated (sync
    # flag + the list being provisioned), so it is never represented as active
    # capability until both hold.
    scope: runtime (push-only mirror; gated)
    autonomous: false # writes a mirror list only; never sends/posts/joins
    default_state: off
    feature_flag: PLX_MC_SYNC_ENABLED (rides the sync scheduler; src/lib/sync/scheduler.ts)
    kill_switch: >-
      PLX_MC_SYNC_ENABLED != 1 stops every sweep; additionally the mirror is
      list-gated — if the "Repo Registry" list is not provisioned, the sweep
      skips it with an audit row (src/lib/sync/engine.ts pushRepoRegistry).
    auth_source:
      - Microsoft Graph (app-only client credentials) — MICROSOFT_GRAPH_* via graphCredentials()
    health_check: >-
      The sweep audits "Repo Registry list not provisioned — registry mirror
      skipped" when the optional list is absent, and queues a push error on a
      rejected write — visible state, never fabricated success.
    fallback_path: >-
      The plx_mc DB (repos / repo_requests tables) is the system of record for
      the registry + approvals; the SharePoint list is a one-way human-readable
      mirror. If the list is unprovisioned or Graph is unavailable, persistence
      and the allow-list keep working and the mirror is skipped/queued.
    data_audit_boundary: >-
      Mirrors only repo metadata (id, name, owner, visibility, default branch,
      language, scope) — no secrets, no PII. Approvals are gated by the
      Owner/Admin role (lib/mc-data/repos.ts isApprover); the request queue
      records who requested/decided each repo with timestamps.

# Unified Governance Contract
#
# This is the SINGLE SOURCE OF TRUTH for all agent governance rules in this
# repository. Every other surface — .cursor/rules/governance.mdc and the
# marker blocks inside AGENTS.md / CLAUDE.md — derives from this file.
#
# When editing: change here first, then run:
#   python scripts/generate-governance-surfaces.py
#
# CI drift gate:
#   python scripts/generate-governance-surfaces.py --check
#
# Canonical location: config/governance-contract.yaml
# Owner: Vince (vince@petrasoap.com)
# Enforcement: scripts/preflight.sh (pre-commit, pre-push, ci modes)

version: "0.1.0"

# Files that receive the generated governance block between
# <!-- governance:auto:start --> / <!-- governance:auto:end --> markers.
# Add CODEX.md, GROK.md, GEMINI.md, etc. as you adopt more agent runtimes.
surfaces:
  marker_files:
    - AGENTS.md
    - CLAUDE.md
  rule_file: .cursor/rules/governance.mdc

pillars:
  - id: mission-first
    ordinal: 1
    title: Mission First
    rule: >-
      Every edit, suggestion, and refactor must serve the mission. Do not
      introduce changes that lack a clear tie to project goals. Do not merge
      code without a stated connection to the mission.

  - id: simplify-relentlessly
    ordinal: 2
    title: Simplify Relentlessly
    rule: >-
      Prefer the simplest correct solution. Simplify first, optimize second,
      automate third. Reject unnecessary abstraction. Reduce moving parts
      before adding new ones.

  - id: reuse-before-create
    ordinal: 3
    title: Reuse Before Create
    rule: >-
      Search for existing modules, utilities, and patterns before proposing
      new ones. Extend what exists; do not duplicate. Before creating any new
      file: (1) search docs/modules/, (2) search the shared source tree,
      (3) search scripts/. Duplication without justification is a violation.

  - id: truth-before-action
    ordinal: 4
    title: Truth Before Action
    rule: >-
      When uncertain about intent, scope, or correctness, stop and ask. Do
      not guess at requirements. Do not proceed on assumptions. Do not
      fabricate test results, deployment status, or success claims.

  - id: evidence-over-assertion
    ordinal: 5
    title: Evidence Over Assertion
    rule: >-
      Back claims with code, tests, or data. Prefer executable proof over
      prose explanations. Never claim "all tests passed" without running
      them. Never claim "deployed to production" without evidence.

  - id: prune-ruthlessly
    ordinal: 6
    title: Prune Ruthlessly
    rule: >-
      Delete dead code, unused imports, and stale docs before adding new
      material. Less is better. Remove before adding.

  - id: ownership-and-precision
    ordinal: 7
    title: Ownership and Precision
    rule: >-
      Every requirement, rule, and config value must have a clear owner,
      rationale, and enforcement path. Ambiguity is a bug.

agent_behavior:
  title: Agent Behavioral Contract
  rules:
    - "State assumptions and success criteria before non-trivial work."
    - "Prefer the simplest correct change; do not add speculative abstractions."
    - "Make surgical edits and clean up only your own mess."
    - "Before writing code, read the local file, exports, immediate callers, and obvious shared utilities."
    - "Reuse existing modules and conventions before creating new ones."
    - "Use models for judgment calls, not deterministic routing, retries, status-code handling, transforms, auth, or permission logic."
    - "When repo patterns conflict, choose the newer or more tested pattern, explain why, and flag the other for cleanup."
    - "Tests must protect intent and invariants, not just output shape."
    - "Checkpoint meaningful multi-step progress by summarizing what changed, what was verified, and what remains."
    - "When context grows large or the task starts drifting, summarize the current state and restart from that summary instead of pushing through."
    - "Match local conventions even when you would choose differently in new code."
    - "Fail visibly: never call work complete when checks, records, migrations, edge cases, or deployments were skipped."

repo_hygiene:
  forbidden_root_patterns:
    - "FINAL_*"
    - "QA_*"
    - "*_SUMMARY.md"
    - "*_REPORT.md"
    - "*_ASSESSMENT.md"
    - "*_COMPLETION*.md"
    - "*_CHECKLIST.md"
    - "*_SPECIFICATION.md"
    - "*_20[0-9][0-9]*.md"

  # Extend as the project grows (lockfiles, framework config, etc.).
  approved_root_files:
    - README.md
    - AGENTS.md
    - SOUL.md
    - TOOLS.md
    - LESSONS.md
    - CLAUDE.md
    - pyproject.toml
    - requirements.txt
    - package.json
    - package-lock.json
    - tsconfig.json
    - next.config.ts
    - next-env.d.ts
    - eslint.config.mjs
    - vitest.config.ts
    - playwright.config.ts
    - vercel.json
    - .gitignore
    - .pre-commit-config.yaml

  report_location: "artifacts/<domain>/<yyyy-mm-dd>-<slug>/REPORT.md"
  archive_location: "archive/<yyyy-mm-dd>-<reason>/"
  naming_rules:
    - "No status adjectives in filenames: FINAL, COMPLETE, LATEST, NEW, FIXED"
    - "No case-variant duplicates"
    - "Use lowercase kebab-case for evidence bundle slugs"
  retention:
    active_evidence_days: 30
    incident_evidence_days: 90

code_standards:
  # Python in this repo is governance tooling only (scripts/ + tests/).
  python:
    lint: "ruff check ."
    format: "ruff format --check ."
    test: "pytest -q"
    rules:
      - "Run ruff check and ruff format before every commit"
      - "Run pytest before every commit"
      - "Use %s-style formatting in logger calls, not f-strings"
      - "Tests must write transient artifacts to temp directories, not tracked repo paths"

  typescript:
    typecheck: "npm run typecheck"
    lint: "npm run lint"
    test: "npm run test"
    rules:
      - "Run npm run typecheck before every commit"
      - "All UI color comes from --p-* design tokens behind the .brand-plx boundary — no raw hex in components (brand authority: plx-customer-portal, see ADR-003)"
      - "All API routes go through one shared route wrapper — no ad hoc handler boilerplate"
      - "Mutating routes (POST/PATCH/PUT/DELETE) require schema validation (e.g. Zod) — no manual typeof checks"
      - "One standard response envelope: { data } on success, { error: { code, message } } on failure"
      - "All frontend API calls go through one shared fetch wrapper — no raw fetch('/api/...')"
      - "No flat file may shadow a module directory barrel — if lib/foo/index.ts exists, lib/foo.ts must not"

  dependencies:
    rules:
      - "Governance tooling deps live in requirements.txt — verify a clean install after changes"
      - "Commit lockfiles in the same change that modifies the manifest"
      - "Re-run the typecheck/test gate after any dependency change"

module_boundaries:
  rules:
    - "Every module needs a contract README at docs/modules/<name>/README.md with: What, Why, How, Dependencies, Owner"
    - "Import through module entry points (barrel index), not internal module files"
    - "Compatibility shims must include a removal date comment: module-shim — remove after YYYY-MM-DD"
    - "A shim past its expiry date is a CRITICAL violation"

# Re-added 2026-06-11 with the first migrations (sync engine persistence:
# db/migrations/, runner scripts/migrate.mjs, gate scripts/check-migrations.py).
database:
  rules:
    - "NEVER use DROP TABLE, TRUNCATE, or DELETE FROM without a WHERE clause"
    - "Treat every connection as if it has full DDL privileges on production data"
    - "All DDL goes through a numbered migration runner — no inline CREATE TABLE or ALTER TABLE in application code"
    - "All SQL uses parameterized placeholders — never string interpolation of user input"
    - "All migration INSERTs must be idempotent (ON CONFLICT DO NOTHING or equivalent)"
    - "Migration failures must crash the deploy (exit 1), never continue with broken schema"
    - "Numbered migrations are globally serialized — two PRs must never ship the same numeric prefix; CI fails on duplicates"

branch_hygiene:
  rules:
    - "One PR per logical theme — never stack unrelated work on a shared branch"
    - "Delete branches immediately after PR merge or abandonment"
    - "Do not let multiple agents push to the same branch without coordination"
    - "File issues for code defects only — not for environment or toolchain problems"

testing:
  rules:
    - "Tests assert invariants, not implementation details"
    - "Every governance enforcement script must have at least one test verifying its exit-code behavior"
    - "Monkeypatch targets must match the module where the symbol is used at runtime, not where it was defined"
    - "Every session that modifies source code must run the relevant verification commands and show exit-0 evidence"

safety:
  rules:
    - "Do not fabricate evidence, test results, or deployment claims"
    - "Do not create files that reference nonexistent modules or APIs"
    - "Do not rewrite store/schema-owning modules without reviewing the existing schema first"
    - "Do not add new dependencies without checking existing modules (Pillar 3: Reuse Before Create)"
    - "Secrets come from a secrets manager via one shared accessor — no hardcoded keys, no scattered env lookups"

external_integrations:
  rules:
    - "Every new external provider, MCP server, or operator-side tool must declare before merge: owner, scope (runtime vs local-only), auth source, default state, kill switch or feature flag, health check, fallback path, and data/audit boundary"
    - "Operator-local tools ship disabled by default in committed config and are never represented as deployed runtime capability"
    - "Integrations that can act autonomously (send, post, join, record) require explicit enablement and auditable state"
